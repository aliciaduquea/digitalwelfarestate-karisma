# Configuración del micrositio
title: "PROTECCIÓN SOCIAL AUTOMATIZADA"
description: "Datos y derechos"
lang: es

# IMPORTANTE para GitHub Pages:
# Si el sitio se publica en https://USUARIO.github.io/NOMBRE-DEL-REPO/
# baseurl debe ser "/NOMBRE-DEL-REPO". Si usan un dominio propio, déjenlo en "".
baseurl: "/digitalwelfarestate-karisma"
url: ""

collections:
  medidas:
    output: true
    permalink: /medidas/:name/
    sort_by: numero
  herramientas:
    output: true
    permalink: /herramientas/:name/
    sort_by: orden

defaults:
  - scope:
      path: ""
      type: medidas
    values:
      layout: medida
  - scope:
      path: ""
      type: herramientas
    values:
      layout: herramienta

markdown: kramdown
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

  corta: "Verificación"
  descripcion: "La etapa que mayores daños ha producido en la experiencia del Sisbén. La verificación sin garantías, la carga de la prueba invertida y la ausencia de mecanismos accesibles de reclamo han convertido errores técnicos en exclusiones prolongadas o definitivas."

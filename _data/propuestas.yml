grupos:
  - id: g1
    nombre: "Transparencia e información"
  - id: g2
    nombre: "Debido proceso y verificación"
  - id: g3
    nombre: "Acceso y corrección"
  - id: g4
    nombre: "Gobernanza de datos"
  - id: g5
    nombre: "No discriminación y dignidad"
  - id: g6
    nombre: "Gobernanza institucional, participación y transiciones"

items:
  - numero: 1
    grupo: g1
    titulo: "Notificación obligatoria e información plena sobre cambios de clasificación"
    alcance: plena
    traduccion: "Protocolos de comunicación, plazos definidos, contenidos mínimos y canales accesibles para informar cambios de clasificación."
    medida: 7
  - numero: 2
    grupo: g1
    titulo: "Transparencia metodológica del modelo de clasificación"
    alcance: fuera
    traduccion: "Requiere decisiones institucionales más amplias del DNP sobre apertura metodológica y publicidad del modelo."
  - numero: 3
    grupo: g1
    titulo: "Explicabilidad individual de la clasificación"
    alcance: plena
    traduccion: "Formatos de explicación individual, guías para funcionarios y criterios mínimos para comunicar datos, razones y opciones de corrección en lenguaje claro."
    medida: 8
  - numero: 4
    grupo: g2
    titulo: "Verificación con garantías y sin suspensión automática"
    alcance: plena
    traduccion: "Reglas operativas sobre causales, plazos, notificación oportuna y mantenimiento de la clasificación mientras se resuelve la verificación."
    medida: 10
  - numero: 5
    grupo: g2
    titulo: "Traslado de la carga de la prueba al Estado"
    alcance: plena
    traduccion: "Principio rector de actuación en procesos de verificación y tratamiento de inconsistencias detectadas por el propio Estado."
    medida: 11
  - numero: 6
    grupo: g2
    titulo: "Acto administrativo motivado y apelable para cambios de clasificación"
    alcance: parcial
    traduccion: "No entra en su versión formal completa, pero sí como estándar mínimo de motivación, documentación escrita, trazabilidad y ruta de reclamación."
    medida: 9
  - numero: 7
    grupo: g2
    titulo: "Rediseño no punitivo de verificación, sanciones y condicionalidades"
    alcance: fuera
    traduccion: "Su dimensión principal excede el ámbito operativo del playbook y depende de decisiones sustantivas sobre condicionalidades y sanciones en otros programas."
  - numero: 8
    grupo: g3
    titulo: "Recursos, quejas y apelaciones accesibles"
    alcance: plena
    traduccion: "Rutas de reclamo, plazos de respuesta, trazabilidad, protocolos de escalamiento y mecanismos accesibles de remedio."
    medida: 12
  - numero: 9
    grupo: g3
    titulo: "Acceso continuo al registro, actualización y corrección"
    alcance: plena
    traduccion: "Eliminación de barreras, disponibilidad continua, simplificación de trámites y trazabilidad de correcciones."
    medida: 4
  - numero: 10
    grupo: g3
    titulo: "Canales locales, gratuitos y adaptables"
    alcance: plena
    traduccion: "Estándares de atención cercanos, gratuitos, presenciales y no exclusivamente digitales, adaptados a distintos contextos territoriales."
    medida: 5
  - numero: 11
    grupo: g4
    titulo: "Prohibición de usos secundarios y comerciales de los datos"
    alcance: fuera
    traduccion: "Requiere decisiones institucionales y regulatorias más amplias sobre finalidad, convenios e intercambio de datos."
  - numero: 12
    grupo: g4
    titulo: "Proporcionalidad, calidad y auditoría de interoperabilidad"
    alcance: parcial
    traduccion: "Módulo técnico para equipos centrales del DNP, con checklists, criterios mínimos y registros de trazabilidad."
    medida: 6
  - numero: 13
    grupo: g4
    titulo: "Límites a modelos predictivos y analítica punitiva"
    alcance: fuera
    traduccion: "Exige decisiones de gobernanza algorítmica y regulación institucional que exceden el alcance operativo del playbook."
  - numero: 14
    grupo: g5
    titulo: "Enfoque diferencial y revisión de sesgos"
    alcance: parcial
    traduccion: "No entra como bloque autónomo, pero sí como principio transversal de implementación aplicable a todas las medidas operativas."
  - numero: 15
    grupo: g5
    titulo: "Abandono del paradigma de sospecha y estigmatización"
    alcance: plena
    traduccion: "Revisión del lenguaje institucional, eliminación de mensajes estigmatizantes, formación de funcionarios y adopción de la buena fe como principio rector."
    medida: 3
  - numero: 16
    grupo: g6
    titulo: "Claridad de roles, responsabilidades y supervisión independiente"
    alcance: parcial
    traduccion: "No entra el componente de supervisión independiente, pero sí su dimensión operativa, mediante mapas de funciones, rutas de escalamiento, remisión y trazabilidad."
    medida: 1
  - numero: 17
    grupo: g6
    titulo: "Participación vinculante de comunidades afectadas"
    alcance: fuera
    traduccion: "Requiere mecanismos institucionales de participación e incidencia que exceden lo que el playbook puede operacionalizar sin vaciar la reforma de contenido."
  - numero: 18
    grupo: g6
    titulo: "Políticas de transición y principio pro-inclusión"
    alcance: parcial
    traduccion: "Entra por sus componentes operativos, como comunicación anticipada de cambios, períodos de transición y criterio pro-inclusión en situaciones de duda."
    medida: 2

secciones:
  - id: s1
    nombre: "Gobernanza y responsabilidades institucionales"
    descripcion: "Herramientas para identificar los actores que intervienen en cada etapa del sistema, sus funciones, los mecanismos de coordinación y los posibles vacíos o riesgos de gobernanza."
  - id: s2
    nombre: "Comunicación efectiva del RUI"
    descripcion: "Protocolos y listas de verificación para comunicar cambios metodológicos de forma anticipada, clara y respetuosa de los derechos de las personas."
  - id: s3
    nombre: "Atención multicanal y seguimiento de solicitudes"
    descripcion: "Formatos y estándares para que los canales de atención sean accesibles, gratuitos y trazables en todos los territorios."
  - id: s4
    nombre: "Calidad y trazabilidad de los datos"
    descripcion: "Instrumentos para verificar la calidad de los registros administrativos antes de usarlos y para documentar qué fuentes alimentan cada clasificación."
  - id: s5
    nombre: "Notificación de resultados y clasificación"
    descripcion: "Plantillas y protocolos para informar, notificar y documentar decisiones sobre la clasificación de las personas."

items:
  - id: r1
    numero: "1"
    seccion: s1
    titulo: "Mapa de funciones institucionales por etapa del sistema"
    descripcion: "Permite reconstruir el recorrido de una persona a través del sistema e identificar, para cada proceso, la entidad responsable, las rutas de escalamiento, los plazos de respuesta y el sustento normativo. Facilita detectar vacíos, duplicidades o responsabilidades poco claras."
    plays: [1]
  - id: r2
    numero: "2"
    seccion: s1
    titulo: "Mapa de usuario institucional del RUI"
    descripcion: "Reconstruye la experiencia de una persona que interactúa con el sistema para identificar los puntos de contacto, las entidades involucradas y los momentos en que el trámite puede fallar."
    plays: [1]
  - id: r3
    numero: "3"
    seccion: s1
    titulo: "Matriz de responsabilidades institucionales (RACI)"
    descripcion: "Adapta la matriz RACI a las etapas del RUI para precisar quién es responsable, quién aprueba, a quién se consulta y a quién se informa en cada proceso del sistema."
    plays: [1]
  - id: r4
    numero: "4"
    seccion: s1
    titulo: "Matriz complementaria de responsabilidades"
    descripcion: "Complementa la matriz RACI con información adicional sobre funciones, coordinación y vacíos institucionales."
    plays: [1]
  - id: r5
    numero: "5"
    seccion: s1
    titulo: "Lista de verificación para el análisis de la gobernanza"
    descripcion: "Preguntas orientadoras para evaluar si la gobernanza del RUI cuenta con roles claros, rutas de escalamiento y mecanismos de trazabilidad."
    plays: [1]
  - id: r6
    numero: "6"
    seccion: s2
    titulo: "Protocolo de comunicación anticipada de cambios metodológicos"
    descripcion: "Define cómo, cuándo y por qué canales comunicar a las personas los cambios metodológicos del sistema y sus efectos esperados, en lenguaje claro."
    plays: [2]
  - id: r7
    numero: "7"
    seccion: s2
    titulo: "Lista de verificación para el protocolo de comunicación"
    descripcion: "Permite comprobar que la comunicación de cambios cumple los contenidos mínimos, los plazos y los estándares de accesibilidad definidos en el protocolo."
    plays: [2]
  - id: r8
    numero: "8"
    seccion: s2
    titulo: "Herramienta de revisión de comunicaciones del RUI desde un enfoque de derechos"
    descripcion: "Guía para revisar el lenguaje de comunicaciones, formularios y campañas del RUI y eliminar mensajes que presuman fraude o mala fe de las personas."
    plays: [3]
  - id: r9
    numero: "9"
    seccion: s3
    titulo: "Formato de trazabilidad de solicitudes"
    descripcion: "Registro que permite a la persona y a la entidad hacer seguimiento a cada solicitud de actualización, corrección o reclamación, y verificar que fue procesada dentro de los plazos."
    plays: [4, 12]
  - id: r10
    numero: "10"
    seccion: s3
    titulo: "Lista de verificación para la accesibilidad territorial y multicanal del RUI"
    descripcion: "Estándares mínimos para evaluar si los canales de autodeclaración, actualización y reclamación son accesibles, gratuitos y adaptados a los contextos territoriales."
    plays: [5]
  - id: r11
    numero: "11"
    seccion: s4
    titulo: "Lista de verificación previa al uso de registros administrativos"
    descripcion: "Criterios de completitud, actualización y consistencia que una fuente de datos debe cumplir antes de integrarse al modelo de estimación de ingresos del RUI."
    plays: [6]
  - id: r12a
    numero: "12a"
    seccion: s4
    titulo: "Registro de trazabilidad de fuentes de información"
    descripcion: "Documenta qué fuentes se usaron para cada clasificación individual y permite identificar el origen de las inconsistencias cuando se presenten."
    plays: [6]
  - id: r12b
    numero: "12b"
    seccion: s4
    titulo: "Mapa de registros administrativos utilizados para la clasificación"
    descripcion: "Inventario de las bases de datos que alimentan el RUI, con su entidad administradora, su finalidad y su papel en la estimación de ingresos."
    plays: [6]
  - id: r13
    numero: "13"
    seccion: s5
    titulo: "Plantilla para informar a los usuarios sobre su puntaje en el RUI"
    descripcion: "Formato de explicación individual que indica la fuente de información utilizada, los datos principales que determinaron la clasificación, sus implicaciones y las opciones de corrección."
    plays: [7, 8, 10]
  - id: r14
    numero: "14"
    seccion: s5
    titulo: "Plantilla para notificar sobre cambios en la clasificación en el RUI"
    descripcion: "Contenidos mínimos de la notificación de un cambio de clasificación, incluidos el dato que originó el cambio, la entidad responsable del registro fuente y las rutas de corrección y apelación con sus plazos."
    plays: [7, 8, 10]
  - id: r15
    numero: "15"
    seccion: s5
    titulo: "Registro de trazabilidad de decisiones"
    descripcion: "Registro de todas las decisiones adversas comunicadas, de modo que puedan revisarse en caso de reclamación o auditoría y se identifiquen patrones de exclusión sistemática."
    plays: [9]
  - id: r16
    numero: "16"
    seccion: s5
    titulo: "Versión preliminar de un protocolo interno para resolución de casos"
    descripcion: "Procedimiento interno para resolver inconsistencias y reclamaciones con causales, plazos, responsables y reglas de decisión, aplicando la carga de la prueba sobre el Estado."
    plays: [10, 11, 12]

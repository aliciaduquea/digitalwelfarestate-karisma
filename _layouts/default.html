<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="sitio-header">
    <div class="contenedor header-inner">
      <a class="marca" href="{{ '/' | relative_url }}">
        <span class="marca-nombre">{{ site.title }}</span>
        <span class="marca-tag">{{ site.description }}</span>
      </a>
      <nav class="nav-principal" aria-label="Navegación principal">
        <a href="{{ '/playbook/' | relative_url }}" {% if page.url contains '/playbook' %}class="activo"{% endif %}>Playbook</a>
        <a href="{{ '/playbook/contexto/' | relative_url }}">Del Sisbén al RUI</a>
        <a href="{{ '/playbook/reformas/' | relative_url }}">Reformas</a>
        <a href="{{ '/playbook/recursos/' | relative_url }}">Caja de herramientas</a>
      </nav>
    </div>
  </header>

  <main id="contenido">
    {{ content }}
  </main>

  <footer class="sitio-footer">
    <div class="contenedor footer-inner">
      <p><strong>Fundación Karisma</strong> · Bogotá, Colombia</p>
      <p>Los contenidos de este sitio están disponibles bajo licencia <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.es" rel="license">Creative Commons Atribución-CompartirIgual 4.0</a>.</p>
    </div>
  </footer>
  <script src="{{ '/assets/js/plays.js' | relative_url }}" defer></script>
</body>
</html>
